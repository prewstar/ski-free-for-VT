<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Ski Pro</title>
    <style>
        body {
            margin: 0; background: #333; color: white;
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        #game-container { position: relative; margin-top: 10px; touch-action: none; }
        canvas { background: white; border: 4px solid #000; display: block; image-rendering: pixelated; }
        
        #controls {
            display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(2, 60px);
            gap: 10px; margin-top: 15px; user-select: none;
        }
        .btn {
            width: 60px; height: 60px; background: #555; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 24px; border: 2px solid #fff;
        }
        .btn:active { background: #888; }
        #up { grid-column: 2; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }

        #ui { text-align: center; width: 100%; padding: 10px; }
        #restartBtn { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); padding: 15px 30px; 
            font-size: 20px; cursor: pointer; background: #ff4757; color: white; border: none; z-index: 10;
        }
    </style>
</head>
<body>

<div id="ui">
    Distance: <span id="score">0</span>m | High: <span id="highScore">0</span>m
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <button id="restartBtn">Ouch! Restart</button>
</div>

<div id="controls">
    <div class="btn" id="up">▲</div>
    <div class="btn" id="left">◀</div>
    <div class="btn" id="down">▼</div>
    <div class="btn" id="right">▶</div>
</div>

<script>
const SPRITE_SOURCES = {
    PLAYER_DOWN: "player_down.png",
    PLAYER_LEFT: "player_left.png",
    PLAYER_RIGHT: "player_right.png",
    PLAYER_OBLIQUE_L: "player_obl_left.png",
    PLAYER_OBLIQUE_R: "player_obl_right.png",
    PLAYER_CRASH: "player_crash.png",
    TREE_1: "tree_1.png",
    TREE_2: "tree_2.png",
    TREE_3: "tree_3.png",
    STUMP: "stump.png",
    ROCK: "rock.png",
    DOG: "dog.png"
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const restartBtn = document.getElementById('restartBtn');
const scoreEl = document.getElementById('score');

canvas.width = 400;
canvas.height = 500;

let score = 0;
let highScore = 0;
let gameSpeed = 4;
let isGameOver = false;
let obstacles = [];
let keys = {};

// --- ASSET LOADER ---
const images = {};
let imagesLoaded = 0;
const totalImages = Object.keys(SPRITE_SOURCES).length;

Object.keys(SPRITE_SOURCES).forEach(key => {
    const img = new Image();
    img.src = SPRITE_SOURCES[key];
    img.onload = () => {
        imagesLoaded++;
        if (imagesLoaded === totalImages) {
            initGame();
        }
    };
    img.onerror = () => {
        console.error("Critical Error: Could not find " + SPRITE_SOURCES[key]);
        ctx.fillStyle = "red";
        ctx.fillText("Missing: " + SPRITE_SOURCES[key], 10, 20 + (imagesLoaded * 15));
    };
    images[key] = img;
});

const player = {
    x: 180, y: 100,
    w: 40, h: 40,
    vx: 0,
    state: 'PLAYER_DOWN'
};

// --- INPUTS ---
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

const setupBtn = (id, code) => {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[code] = true; });
    btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[code] = false; });
    btn.addEventListener('mousedown', (e) => { keys[code] = true; });
    btn.addEventListener('mouseup', (e) => { keys[code] = false; });
};
setupBtn('up', 'ArrowUp'); setupBtn('down', 'ArrowDown');
setupBtn('left', 'ArrowLeft'); setupBtn('right', 'ArrowRight');

function spawnObstacle() {
    if (isGameOver) return;
    const rand = Math.random();
    let type = 'ROCK';
    let isMoving = false;

    // Weighting the obstacles
    if (rand < 0.1) { type = 'DOG'; isMoving = true; }
    else if (rand < 0.3) type = 'TREE_1';
    else if (rand < 0.5) type = 'TREE_2';
    else if (rand < 0.7) type = 'TREE_3';
    else if (rand < 0.85) type = 'STUMP';
    else type = 'ROCK';

    obstacles.push({
        x: Math.random() * (canvas.width - 40),
        y: canvas.height,
        w: 40, h: 40,
        type: type,
        isMoving: isMoving,
        dir: Math.random() > 0.5 ? 1 : -1
    });
    
    setTimeout(spawnObstacle, Math.max(300, 1000 - (score/2)));
}

function update() {
    if (isGameOver) return;

    player.vx = 0;
    player.state = 'PLAYER_DOWN';

    if (keys['ArrowLeft']) {
        player.vx = -4;
        player.state = keys['ArrowDown'] ? 'PLAYER_OBLIQUE_L' : 'PLAYER_LEFT';
    } 
    if (keys['ArrowRight']) {
        player.vx = 4;
        player.state = keys['ArrowDown'] ? 'PLAYER_OBLIQUE_R' : 'PLAYER_RIGHT';
    }
    
    player.x += player.vx;
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    let currentSpeed = keys['ArrowUp'] ? gameSpeed * 0.5 : (keys['ArrowDown'] ? gameSpeed * 1.8 : gameSpeed);

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.y -= currentSpeed;
        
        if (obs.isMoving) {
            obs.x += obs.dir * 2;
            if (obs.x <= 0 || obs.x >= canvas.width - obs.w) obs.dir *= -1;
        }

        // Collision Check (Hitbox tightened slightly for pixel art)
        if (player.x < obs.x + obs.w - 8 && player.x + player.w > obs.x + 8 &&
            player.y < obs.y + obs.h - 8 && player.y + player.h > obs.y + 8) {
            endGame();
        }

        if (obs.y + obs.h < 0) obstacles.splice(i, 1);
    }

    score += Math.floor(currentSpeed / 4);
    scoreEl.innerText = score;
}

function draw() {
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    obstacles.forEach(obs => {
        ctx.drawImage(images[obs.type], obs.x, obs.y, obs.w, obs.h);
    });

    ctx.drawImage(images[player.state], player.x, player.y, player.w, player.h);
}

function endGame() {
    isGameOver = true;
    player.state = 'PLAYER_CRASH';
    if (score > highScore) {
        highScore = score;
        document.getElementById('highScore').innerText = highScore;
    }
    restartBtn.style.display = 'block';
}

function gameLoop() {
    update();
    draw();
    if (!isGameOver) requestAnimationFrame(gameLoop);
}

function initGame() {
    spawnObstacle();
    gameLoop();
}

restartBtn.onclick = () => {
    score = 0;
    obstacles = [];
    isGameOver = false;
    player.x = 180;
    player.state = 'PLAYER_DOWN';
    restartBtn.style.display = 'none';
    gameLoop();
};

// Initial loading state
ctx.fillStyle = "black";
ctx.font = "16px Courier New";
ctx.fillText("Gathering gear...", 130, 250);

</script>
</body>
</html>
