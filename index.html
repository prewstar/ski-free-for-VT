<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Ski Pro</title>
    <style>
        body {
            margin: 0; background: #333; color: white;
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        #game-container { position: relative; margin-top: 10px; touch-action: none; }
        canvas { background: #fff; border: 4px solid #000; display: block; image-rendering: pixelated; }
        
        #controls {
            display: grid; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(2, 65px);
            gap: 10px; margin-top: 15px; user-select: none;
        }
        .btn {
            width: 65px; height: 65px; background: #444; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; border: 2px solid #fff; cursor: pointer;
        }
        .btn:active { background: #777; }
        #up { grid-column: 2; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }

        #ui { text-align: center; width: 100%; padding: 10px; font-weight: bold; }
        #restartBtn { 
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); padding: 15px 30px; 
            font-size: 20px; cursor: pointer; background: #ff4757; color: white; 
            border: 3px solid white; z-index: 10; font-family: inherit;
        }
    </style>
</head>
<body>

<div id="ui">
    Distance: <span id="score">0</span>m | High: <span id="highScore">0</span>m
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <button id="restartBtn">RESTART</button>
</div>

<div id="controls">
    <div class="btn" id="up">▲</div>
    <div class="btn" id="left">◀</div>
    <div class="btn" id="down">▼</div>
    <div class="btn" id="right">▶</div>
</div>

<script>
const SPRITE_SOURCES = {
    PLAYER_DOWN: "player_down.png",
    PLAYER_LEFT: "player_left.png",
    PLAYER_RIGHT: "player_right.png",
    PLAYER_OBLIQUE_L: "player_obl_left.png",
    PLAYER_OBLIQUE_R: "player_obl_right.png",
    PLAYER_CRASH: "player_crash.png",
    TREE_1: "tree_1.png",
    TREE_2: "tree_2.png",
    TREE_3: "tree_3.png",
    STUMP: "stump.png",
    ROCK: "rock.png",
    DOG: "dog.png"
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const restartBtn = document.getElementById('restartBtn');
const scoreEl = document.getElementById('score');

canvas.width = 400;
canvas.height = 500;

let score = 0;
let highScore = 0;
let baseSpeed = 4;
let isGameOver = false;
let obstacles = [];
let spawnTimer;

// Steering States: -2 (Left), -1 (Oblique L), 0 (Straight), 1 (Oblique R), 2 (Right)
let steerState = 0; 

const images = {};
let imagesLoaded = 0;
const totalImages = Object.keys(SPRITE_SOURCES).length;

Object.keys(SPRITE_SOURCES).forEach(key => {
    const img = new Image();
    img.onload = () => { if (++imagesLoaded === totalImages) initGame(); };
    img.onerror = () => { imagesLoaded++; if (imagesLoaded === totalImages) initGame(); };
    img.src = SPRITE_SOURCES[key];
    images[key] = img;
});

const player = {
    x: 180, y: 100,
    w: 40, h: 40,
    vx: 0, vy: 0,
    state: 'PLAYER_DOWN'
};

// --- INPUT LOGIC (STEP-BASED STEERING) ---
function handleInput(dir) {
    if (isGameOver) return;

    if (dir === 'LEFT') {
        if (steerState > -2) steerState--;
    } else if (dir === 'RIGHT') {
        if (steerState < 2) steerState++;
    } else if (dir === 'DOWN' || dir === 'UP') {
        steerState = 0; // Reset to straight down
    }
    updatePlayerState();
}

function updatePlayerState() {
    switch(steerState) {
        case -2: player.state = 'PLAYER_LEFT'; player.vx = -4; player.vy = 0; break;
        case -1: player.state = 'PLAYER_OBLIQUE_L'; player.vx = -2; player.vy = 0.7; break;
        case 0:  player.state = 'PLAYER_DOWN'; player.vx = 0; player.vy = 1; break;
        case 1:  player.state = 'PLAYER_OBLIQUE_R'; player.vx = 2; player.vy = 0.7; break;
        case 2:  player.state = 'PLAYER_RIGHT'; player.vx = 4; player.vy = 0; break;
    }
}

window.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft') handleInput('LEFT');
    if (e.code === 'ArrowRight') handleInput('RIGHT');
    if (e.code === 'ArrowDown') handleInput('DOWN');
    if (e.code === 'ArrowUp') handleInput('UP');
});

const setupBtn = (id, dir) => {
    document.getElementById(id).addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(dir); });
    document.getElementById(id).addEventListener('mousedown', (e) => { handleInput(dir); });
};
setupBtn('left', 'LEFT'); setupBtn('right', 'RIGHT');
setupBtn('down', 'DOWN'); setupBtn('up', 'UP');

function spawnObstacle() {
    if (isGameOver) return;
    
    const rand = Math.random();
    let type = 'ROCK';
    let isMoving = false;

    if (rand < 0.1) { type = 'DOG'; isMoving = true; }
    else if (rand < 0.3) type = 'TREE_1';
    else if (rand < 0.5) type = 'TREE_2';
    else if (rand < 0.7) type = 'TREE_3';
    else if (rand < 0.85) type = 'STUMP';

    obstacles.push({
        x: Math.random() * (canvas.width - 40),
        y: canvas.height,
        w: 40, h: 40,
        type: type,
        isMoving: isMoving,
        dir: Math.random() > 0.5 ? 1 : -1
    });
    
    // DIFFICULTY: Decrease spawn delay every 100m (score / 100)
    let difficultyBonus = Math.floor(score / 100) * 50; 
    let spawnDelay = Math.max(150, 1000 - difficultyBonus);
    
    spawnTimer = setTimeout(spawnObstacle, spawnDelay);
}

function update() {
    if (isGameOver) return;

    // Apply horizontal movement
    player.x += player.vx;
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    // Calculate vertical movement speed
    // If sideways, mountain stops moving. If oblique, moves slower.
    let currentSpeed = baseSpeed * player.vy;

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.y -= currentSpeed;
        
        if (obs.isMoving) {
            obs.x += obs.dir * 2;
            if (obs.x <= 0 || obs.x >= canvas.width - obs.w) obs.dir *= -1;
        }

        // Collision
        if (player.x < obs.x + obs.w - 12 && player.x + player.w > obs.x + 12 &&
            player.y < obs.y + obs.h - 12 && player.y + player.h > obs.y + 12) {
            endGame();
        }
        if (obs.y + obs.h < 0) obstacles.splice(i, 1);
    }

    // AUTOMATIC DISTANCE: Score increases by current speed
    if (currentSpeed > 0) {
        score += currentSpeed / 10;
        scoreEl.innerText = Math.floor(score);
    }
}

function draw() {
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    obstacles.forEach(obs => {
        if (images[obs.type].complete) ctx.drawImage(images[obs.type], obs.x, obs.y, obs.w, obs.h);
    });

    if (images[player.state].complete) {
        ctx.drawImage(images[player.state], player.x, player.y, player.w, player.h);
    }
}

function endGame() {
    isGameOver = true;
    clearTimeout(spawnTimer);
    player.state = 'PLAYER_CRASH';
    if (Math.floor(score) > highScore) {
        highScore = Math.floor(score);
        document.getElementById('highScore').innerText = highScore;
    }
    restartBtn.style.display = 'block';
    draw();
}

function gameLoop() {
    update();
    draw();
    if (!isGameOver) requestAnimationFrame(gameLoop);
}

function initGame() {
    updatePlayerState();
    spawnObstacle();
    gameLoop();
}

restartBtn.onclick = () => {
    score = 0;
    obstacles = [];
    isGameOver = false;
    steerState = 0;
    updatePlayerState();
    restartBtn.style.display = 'none';
    
    // Clear any old timers before starting new ones
    clearTimeout(spawnTimer);
    spawnObstacle(); 
    gameLoop();
};
</script>
</body>
</html>
